<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Card Game | Feissal Dev</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="game-header">
    <h1>Memory Card Game</h1>
    <p>Created by Feissal Dev</p>
</header>

<section class="game-container">
    <div class="stats">
        <p>Moves: <span id="moves">0</span></p>
        <p>Time: <span id="timer">0</span>s</p>
    </div>
<div class="difficulty">
<label>Difficulty:</label>

<select id="difficulty">
<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>
</select>

</div>

<p>Best Score: <span id="best-score">--</span></p>
    <div class="grid">
        <!-- 12 cards, 6 pairs -->
        <div class="card" data-name="🍎"><div class="card-inner"><div class="card-front"></div><div class="card-back"></div></div></div>
        <div class="card" data-name="🍎"><div class="card-inner"><div class="card-front"></div><div class="card-back"></div></div></div>

        <div class="card" data-name="🍌"><div class="card-inner"><div class="card-front"></div><div class="card-back"></div></div></div>
        <div class="card" data-name="🍌"><div class="card-inner"><div class="card-front"></div><div class="card-back"></div></div></div>

        <div class="card" data-name="🍇"><div class="card-inner"><div class="card-front"></div><div class="card-back"></div></div></div>
        <div class="card" data-name="🍇"><div class="card-inner"><div class="card-front"></div><div class="card-back"></div></div></div>

        <div class="card" data-name="🍉"><div class="card-inner"><div class="card-front"></div><div class="card-back"></div></div></div>
        <div class="card" data-name="🍉"><div class="card-inner"><div class="card-front"></div><div class="card-back"></div></div></div>

        <div class="card" data-name="🍊"><div class="card-inner"><div class="card-front"></div><div class="card-back"></div></div></div>
        <div class="card" data-name="🍊"><div class="card-inner"><div class="card-front"></div><div class="card-back"></div></div></div>

        <div class="card" data-name="🍓"><div class="card-inner"><div class="card-front"></div><div class="card-back"></div></div></div>
        <div class="card" data-name="🍓"><div class="card-inner"><div class="card-front"></div><div class="card-back"></div></div></div>
    </div>
</section>

<!-- Win message popup -->
<div id="win-message" class="hidden">
    <h2>🏆 Congratulations!</h2>
    <p>You won the game in <span id="final-moves"></span> moves and <span id="final-time"></span> seconds!</p>
    <button id="restart-btn">Play Again</button>
</div>

<footer class="game-footer">
    <p>© 2026 Memory Card Game. Built by Feissal Dev.</p>
</footer>

<script src="script.js"></script>
</body>
</html>
